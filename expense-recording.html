<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERA - Record Expense</title>
    <link rel="stylesheet" href="web.css">
</head>
<body class="theme-expense">
    <div class="dashboard">
        <div class="sidebar">
            <div class="logo"><h2>💰 PERA</h2><p>Expense Manager</p></div>
            <nav class="menu">
                <a class="menu-item" href="home.html">🏠 Home</a>
                <a class="menu-item" href="financial-summary.html">📊 Financial Summary</a>
                <a class="menu-item active" href="expense-recording.html">💸 Expense Recording</a>
                <a class="menu-item" href="income-management.html">💰 Income Management</a>
                <a class="menu-item" href="bank-management.html">🏦 Bank Management</a>
                <a class="menu-item" href="recurring-payments.html">🔁 Recurring Payments</a>
            </nav>
            <div class="logout"><button onclick="logout()">Logout</button></div>
        </div>

        <div class="main">
            <div class="topbar"><h1>Expense Recording</h1><p>Log a new transaction</p></div>
            <div class="form-container" style="max-width: 500px; margin: 0 auto;">
                <form id="expenseForm">
    <div class="input-group">
        <label>Amount (₱)</label>
        <input type="number" id="expAmount" placeholder="0.00" required>
    </div>
    <div class="input-group">
        <label>Category</label>
        <input type="text" id="expCategory" placeholder="e.g. Food, Rent" required>
    </div>
    <div class="input-group">
        <label>Date</label>
        <input type="date" id="expDate" required>
    </div>
    <button type="submit" style="background: #f87171; width: 100%;">Save Expense</button>
</form>
            </div>
        </div>
    </div>
    <script src="web.js"></script>
</body>
</html>
