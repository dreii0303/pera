<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERA - Recurring Payments</title>
    <link rel="stylesheet" href="web.css">
</head>
<body class="theme-recurring">
    <div class="dashboard">
        <div class="sidebar">
            <div class="logo"><h2>💰 PERA</h2><p>Expense Manager</p></div>
            <nav class="menu">
                <a class="menu-item" href="home.html">🏠 Home</a>
                <a class="menu-item" href="financial-summary.html">📊 Financial Summary</a>
                <a class="menu-item" href="expense-recording.html">💸 Expense Recording</a>
                <a class="menu-item" href="income-management.html">💰 Income Management</a>
                <a class="menu-item" href="bank-management.html">🏦 Bank Management</a>
                <a class="menu-item active" href="recurring-payments.html">🔁 Recurring Payments</a>
            </nav>
            <div class="logout"><button onclick="logout()">Logout</button></div>
        </div>

        <div class="main">
            <div class="topbar">
                <h1>Recurring Payments</h1>
                <p>Manage your automated monthly bills and subscriptions</p>
            </div>

<div class="cards" style="margin-bottom: 30px;">
    <div class="card" style="border-left: 5px solid #4db8ff; background: rgba(77, 184, 255, 0.1);">
        <h3 style="color: #4db8ff;">Total Monthly Commitment</h3>
        <div class="amount" id="recurringTotal" style="color: white;">₱0.00</div>
    </div>
</div>

<div class="form-container" style="margin-bottom: 40px; max-width: 100%;">
    <h2 style="color: white; margin-bottom: 20px; font-size: 1.2rem;">➕ Add New Subscription</h2>
    <form id="recurringForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: flex-end;">
        <div class="input-group" style="margin-bottom: 0;">
            <label>Service Name</label>
            <input type="text" id="recName" placeholder="e.g. Netflix, Spotify" required>
        </div>
        <div class="input-group" style="margin-bottom: 0;">
            <label>Monthly Amount (₱)</label>
            <input type="number" id="recAmount" placeholder="0.00" step="0.01" required>
        </div>
        <div class="input-group" style="margin-bottom: 0;">
            <label>Next Billing Date</label>
            <input type="date" id="recDate" required>
        </div>
        <button type="submit" style="margin-top: 0; background: #4db8ff; color: #0f2027; font-weight: bold;">
            ADD SUBSCRIPTION
        </button>
    </form>
</div>

            <h2 style="color: white; margin-bottom: 20px; font-size: 1.4rem;">Your Subscriptions</h2>
            <div id="recurringList" class="cards">
                </div>
        </div>
    </div>
    <script src="web.js"></script>
</body>
</html>
