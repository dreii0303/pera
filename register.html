<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERA - Register</title>
    <link rel="stylesheet" href="web.css">
</head>
<body>

<div class="page">
    <div class="left">
        <div class="brand">
            <h1>💰 PERA</h1>
            <p>Personal Expenses Recording Assistant</p>
        </div>
        <div class="features">
            <div class="feature">📊 Track your expenses easily</div>
            <div class="feature">🏦 Manage bank accounts</div>
            <div class="feature">🔁 Recurring payments tracking</div>
            <div class="feature">📈 Financial summaries</div>
        </div>
    </div>

    <div class="right">
        <div class="login-card">
            <h2>Create Account</h2>
            <p class="subtitle">Start managing your expenses</p>

            <form id="registerForm">
                <div class="input-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" placeholder="Juan Dela Cruz">
                    <small class="error" id="nameError"></small>
                </div>

                <div class="input-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" placeholder="example@email.com">
                    <small class="error" id="emailError"></small>
                </div>

                <div class="input-group">
                    <label for="password">Password *</label>
                    <div class="password-box">
                        <input type="password" id="password" placeholder="Create password">
                        <span class="toggle-btn" id="togglePass">Show</span>
                    </div>
                    <small class="error" id="passwordError"></small>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <div class="password-box">
                        <input type="password" id="confirmPassword" placeholder="Confirm password">
                        <span class="toggle-btn" id="toggleConfirm">Show</span>
                    </div>
                    <small class="error" id="confirmError"></small>
                </div>

                <button type="submit" id="registerBtn" disabled>Create Account</button>
                <p class="success" id="successMessage"></p>
            </form>

            <div class="links">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>
</div>

<script src="web.js"></script>
</body>
</html>
